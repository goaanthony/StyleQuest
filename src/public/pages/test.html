<head>
    <link rel="stylesheet" href="../../styles/game.css"> 
</head>

<body>
    <h1>Simulateur de Niveaux & Jeu</h1>

    <div id="game-container" class="card"></div>

    <div class="controls">
        <button id="prevBtn" class="secondary">❮ Précédent</button>
        <input type="number" id="levelInput" value="1" min="1">
        <button id="nextBtn">Suivant ❯</button>
    </div>

    <script type="module">
        import { GameEngine } from '../../generator/GameEngine.ts';

        const game = new GameEngine('game-container');
        let currentLevel = 1;

        function updateLevel(lvl) {
            currentLevel = lvl;
            document.getElementById('levelInput').value = lvl;
            
            game.loadLevel(currentLevel);
        }

        document.getElementById('nextBtn').onclick = () => updateLevel(currentLevel + 1);
        document.getElementById('prevBtn').onclick = () => updateLevel(currentLevel - 1);
        document.getElementById('levelInput').onchange = (e) => updateLevel(parseInt(e.target.value));

        updateLevel(1);
    </script>
</body>
